<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VolleyStat — Live Tournament Stats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="title-wrap">
      <h1>LIVE Courtside Volleyball Stat App</h1>
      <div class="version">Version Alpha 0.0.8</div>
    </div>

    <div class="toolbar">
      <div class="group">
        <div class="group-title">SERVING (OPPONENT PASS RESULT)</div>
        <div class="btn-row">
          <button class="btn" data-action="serve1"><span class="btn-text">1</span></button>
          <button class="btn" data-action="serve2"><span class="btn-text">2</span></button>
          <button class="btn" data-action="serve3"><span class="btn-text">3</span></button>
          <button class="btn" data-action="ace"><span class="btn-text">ACE</span></button>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main">
    <!-- ✅ REQUIRED SELECT CONTROLS (RESTORED) -->
    <section class="controls">
      <div class="control">
        <label>Team</label>
        <select id="teamSelect"></select>
      </div>

      <div class="control">
        <label>Match</label>
        <select id="matchSelect"></select>
      </div>

      <div class="control">
        <label>Set</label>
        <select id="setSelect">
          <option value="1">Set 1</option>
          <option value="2">Set 2</option>
          <option value="3">Set 3</option>
        </select>
      </div>

      <div class="control">
        <label>View</label>
        <select id="viewSelect">
          <option value="set">Current Set</option>
          <option value="match">Current Match</option>
          <option value="tournament" selected>Tournament Total</option>
        </select>
      </div>
    </section>

    <section class="table-wrap">
      <table id="statsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th>Pos</th>
            <th>Serve Att</th>
            <th>Serve Avg</th>
            <th style="text-align:right;">
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                <div>Pressure%</div>
                <div style="width:110px;height:6px;border-radius:999px;background:linear-gradient(90deg,hsl(120 75% 85%),hsl(60 75% 80%),hsl(0 75% 70%));"></div>
                <div style="width:110px;display:flex;justify-content:space-between;font-size:10px;color:#6b7280;font-weight:800;letter-spacing:.02em;">
                  <span>Easy</span><span>Pressure</span>
                </div>
              </div>
            </th>
            <th>ACE</th>
            <th>Ace%</th>
            <th>Pass Att</th>
            <th>Pass Avg</th>
            <th>Hit Att</th>
            <th>Hit Avg</th>
            <th>Kills</th>
            <th>Kill%</th>
          </tr>
        </thead>
        <tbody id="statsBody"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
